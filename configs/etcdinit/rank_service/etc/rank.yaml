Name: rank
Host: 0.0.0.0
Port: 0
bootstrap:
  etcd:
    hosts:
      - 127.0.0.1:2379
    key: bootstrap
  keys:
    config: rank.config
    runtime: rank.rest.runtime
    log: rank.log
Mysql:
  dataSource: user:password@tcp(127.0.0.1:3306)/fuzoj?charset=utf8mb4&parseTime=true&loc=Local
Cache:
  - host: 127.0.0.1:6379
    type: node
Redis:
  host: 127.0.0.1:6379
  type: node
Kafka:
  brokers:
    - 127.0.0.1:9092
  clientID: rank-service
  minBytes: 10240
  maxBytes: 10485760
Rank:
  updateTopic: contest.rank.updates
  consumerGroup: rank-service
  prefetchCount: 1
  concurrency: 8
  batchSize: 200
  batchInterval: 100ms
  hotCacheTTL: 3s
  pageCacheTTL: 5s
  emptyTTL: 5m
  wsDebounce: 100ms
  snapshotInterval: 5m
  snapshotPageSize: 500
  snapshotBatch: 500
  recoverOnStart: true
Timeouts:
  cache: 1s
  db: 3s
  mq: 3s
