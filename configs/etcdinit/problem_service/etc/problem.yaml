Name: problem
Host: 0.0.0.0
Port: 0
bootstrap:
  etcd:
    hosts:
      - 127.0.0.1:2379
    key: bootstrap
  keys:
    config: problem.config
    runtime: problem.rest.runtime
    rpcRuntime: problem.rpc.runtime
    log: problem.log
Rpc:
  Name: problem.rpc
  ListenOn: 0.0.0.0:0
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: problem.rpc
Mysql:
  DataSource: user:password@tcp(127.0.0.1:3306)/fuzoj?charset=utf8mb4&parseTime=true&loc=Local
Cache:
  - Host: 127.0.0.1:6379
    Type: node
Redis:
  Host: 127.0.0.1:6379
  Type: node
Kafka:
  Brokers:
    - 127.0.0.1:9092
  ClientID: problem-service
  MinBytes: 10240
  MaxBytes: 10485760
MinIO:
  Endpoint: 127.0.0.1:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  UseSSL: false
  Bucket: problem-data
  PresignTTL: 15m
Upload:
  KeyPrefix: problems
  PartSizeBytes: 16777216
  SessionTTL: 2h
  PresignTTL: 15m
Cleanup:
  Topic: problem.cleanup
  ConsumerGroup: problem-cleanup
  PrefetchCount: 10
  Concurrency: 2
  MaxRetries: 3
  RetryDelay: 1s
  DeadLetterTopic: ""
  MessageTTL: 0s
  BatchSize: 1000
  ListTimeout: 30s
  DeleteTimeout: 2m
  MaxUploads: 1000
Statement:
  MaxBytes: 131072
  RedisTTL: 30m
  EmptyTTL: 5m
  LocalCacheSize: 1024
  LocalCacheTTL: 5m
  Timeout: 2s
