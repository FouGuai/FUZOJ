Name: judge
Host: 0.0.0.0
Port: 0
bootstrap:
  etcd:
    hosts:
      - 127.0.0.1:2379
    key: bootstrap
  keys:
    config: judge.config
    runtime: judge.rest.runtime
    log: judge.log
Mysql:
  DataSource: user:password@tcp(127.0.0.1:3306)/fuzoj?charset=utf8mb4&parseTime=true&loc=Local
Cache:
  - Host: 127.0.0.1:6379
    Type: node
Redis:
  Host: 127.0.0.1:6379
  Type: node
StatusCacheTTL: 30m
StatusCacheEmptyTTL: 5m
Kafka:
  Brokers:
    - 127.0.0.1:9092
  ClientID: judge-service
  MinBytes: 10240
  MaxBytes: 10485760
  MaxWait: 1s
  BatchSize: 100
  BatchTimeout: 1s
  DialTimeout: 3s
  ReadTimeout: 3s
  WriteTimeout: 3s
  RequiredAcks: 1
  Compression: "none"
  Topics:
    - judge.level0
    - judge.level1
    - judge.level2
    - judge.level3
  TopicWeights:
    judge.level0: 8
    judge.level1: 4
    judge.level2: 2
    judge.level3: 1
  ConsumerGroup: judge-service
  PrefetchCount: 10
  Concurrency: 4
  MaxRetries: 3
  RetryDelay: 1s
  RetryTopic: judge.retry
  PoolRetryMax: 5
  PoolRetryBaseDelay: 1s
  PoolRetryMaxDelay: 30s
  DeadLetter: judge.dead
  MessageTTL: 10m
MinIO:
  Endpoint: 127.0.0.1:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  UseSSL: false
  Bucket: judge-data
  PresignTTL: 15m
CacheConfig:
  RootDir: /data/judge/cache
  TTL: 30m
  LockWait: 5s
  MaxEntries: 256
  MaxBytes: 10737418240
Worker:
  PoolSize: 4
  Timeout: 30s
Source:
  Bucket: judge-sources
  Timeout: 10s
ProblemRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: problem.rpc
  Timeout: 2000
  CallTimeout: 2s
  MetaTTL: 30s
Status:
  TTL: 30m
  Timeout: 2s
  FinalTopic: judge.status.final
Judge:
  WorkRoot: /data/judge/work
Sandbox:
  CgroupRoot: /sys/fs/cgroup
  SeccompDir: /etc/judge/seccomp
  HelperPath: /usr/local/bin/judge-helper
  StdoutStderrMaxBytes: 1048576
  EnableSeccomp: true
  EnableCgroup: true
  EnableNamespaces: true
Language:
  Languages: []
  Profiles: []
