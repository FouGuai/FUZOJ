Name: judge
Host: 0.0.0.0
Port: 0
bootstrap:
  etcd:
    hosts:
      - 127.0.0.1:2379
    key: bootstrap
  keys:
    config: judge.config
    runtime: judge.rest.runtime
    log: judge.log
Mysql:
  DataSource: user:password@tcp(127.0.0.1:3306)/fuzoj?charset=utf8mb4&parseTime=true&loc=Local
Cache:
  - Host: 127.0.0.1:6379
    Type: node
Redis:
  Host: 127.0.0.1:6379
  Type: node
StatusCacheTTL: 30m
StatusCacheEmptyTTL: 5m
Kafka:
  Brokers:
    - 127.0.0.1:9092
  ClientID: judge-service
  MinBytes: 10240
  MaxBytes: 10485760
  MaxWait: 1s
  BatchSize: 100
  BatchTimeout: 1s
  DialTimeout: 3s
  ReadTimeout: 3s
  WriteTimeout: 3s
  RequiredAcks: 1
  Compression: "none"
  Topics:
    - judge.level0
    - judge.level1
    - judge.level2
    - judge.level3
  TopicWeights:
    judge.level0: 8
    judge.level1: 4
    judge.level2: 2
    judge.level3: 1
  ConsumerGroup: judge-service
  PrefetchCount: 10
  Concurrency: 4
  MaxRetries: 3
  RetryDelay: 1s
  RetryTopic: judge.retry
  PoolRetryMax: 5
  PoolRetryBaseDelay: 1s
  PoolRetryMaxDelay: 30s
  DeadLetter: judge.dead
  MessageTTL: 10m
MinIO:
  Endpoint: 127.0.0.1:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  UseSSL: false
  Bucket: fuzoj
  PresignTTL: 15m
CacheConfig:
  RootDir: /home/foushen.zhan/fuzoj/tmp/cache
  TTL: 30m
  LockWait: 5s
  MaxEntries: 256
  MaxBytes: 10737418240
Worker:
  PoolSize: 4
  Timeout: 30s
Source:
  Bucket: fuzoj
  Timeout: 10s
ProblemRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: problem.rpc
  Timeout: 2000
  CallTimeout: 2s
  MetaTTL: 30s
Status:
  TTL: 30m
  Timeout: 2s
  FinalTopic: judge.status.final
Judge:
  WorkRoot: /home/foushen.zhan/fuzoj/tmp/work
Sandbox:
  CgroupRoot: /sys/fs/cgroup
  SeccompDir: /etc/judge/seccomp
  HelperPath: /home/foushen.zhan/fuzoj/logs/bin/sandbox-init
  StdoutStderrMaxBytes: 1048576
  EnableSeccomp: true
  EnableCgroup: true
  EnableNamespaces: true
Language:
  Languages:
    - ID: cpp
      Name: C++
      Version: gnu++17
      SourceFile: main.cpp
      BinaryFile: main
      CompileEnabled: true
      CompileCmdTpl: "g++ -std=gnu++17 -O2 -pipe {extraFlags} -o {bin} {src}"
      RunCmdTpl: "{bin}"
      Env:
        - LANG=C
        - LC_ALL=C
      TimeMultiplier: 1.0
      MemoryMultiplier: 1.0
  Profiles:
    - LanguageID: cpp
      TaskType: compile
      RootFS: cpp-compile-rootfs
      SeccompProfile: cpp-compile.json
      DefaultLimits:
        CPUTimeMs: 5000
        WallTimeMs: 6000
        MemoryMB: 1024
        StackMB: 256
        OutputMB: 64
        PIDs: 64
    - LanguageID: cpp
      TaskType: run
      RootFS: cpp-run-rootfs
      SeccompProfile: cpp-run.json
      DefaultLimits:
        CPUTimeMs: 1000
        WallTimeMs: 2000
        MemoryMB: 512
        StackMB: 256
        OutputMB: 64
        PIDs: 64
