Name: submit
Host: 0.0.0.0
Port: 0
bootstrap:
  etcd:
    hosts:
      - 127.0.0.1:2379
    key: bootstrap
  keys:
    config: submit.config
    runtime: submit.rest.runtime
    log: submit.log
Mysql:
  DataSource: user:password@tcp(127.0.0.1:3306)/fuzoj?charset=utf8mb4&parseTime=true&loc=Local
Cache:
  - Host: 127.0.0.1:6379
    Type: node
Redis:
  Host: 127.0.0.1:6379
  Type: node
Kafka:
  Brokers:
    - 127.0.0.1:9092
  ClientID: submit-service
  MinBytes: 10240
  MaxBytes: 10485760
MinIO:
  Endpoint: 127.0.0.1:9000
  AccessKey: minioadmin
  SecretKey: minioadmin
  UseSSL: false
  Bucket: fuzoj
Topics:
  Level0: judge.level0
  Level1: judge.level1
  Level2: judge.level2
  Level3: judge.level3
ContestRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: contest.rpc
Submit:
  SourceBucket: fuzoj
  SourceKeyPrefix: submissions
  MaxCodeBytes: 262144
  IdempotencyTTL: 10m
  BatchLimit: 200
  StatusTTL: 24h
  StatusEmptyTTL: 5m
  StatusFinalTopic: judge.status.final
  StatusFinalConsumer:
    ConsumerGroup: submit-service-status-final
    PrefetchCount: 1
    Concurrency: 2
    MaxRetries: 3
    RetryDelay: 1s
    DeadLetterTopic: judge.status.final.dead
    MessageTTL: 10m
  SubmissionCacheTTL: 30m
  SubmissionEmptyTTL: 5m
  RateLimit:
    UserMax: 30
    IPMax: 60
    Window: 1m
  Timeouts:
    DB: 3s
    Cache: 1s
    MQ: 3s
    Storage: 5s
    Status: 2s
    ContestRPC: 800ms
