syntax = "proto3";

package rank;

option go_package = "fuzoj/api/proto/rank;rank";

message LeaderboardEntry {
  string member_id = 1;
  int64 rank = 2;
  int64 score = 3;
  int64 penalty = 4;
  string detail_json = 5;
}

message PageInfo {
  int32 page = 1;
  int32 page_size = 2;
  int64 total = 3;
}

message GetLeaderboardRequest {
  string contest_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string mode = 4;
}

message LeaderboardReply {
  repeated LeaderboardEntry items = 1;
  PageInfo page = 2;
  string version = 3;
}

message GetMemberRankRequest {
  string contest_id = 1;
  string member_id = 2;
  string mode = 3;
}

message MemberRankReply {
  LeaderboardEntry entry = 1;
  int64 total = 2;
  string version = 3;
}

service RankRpc {
  rpc GetLeaderboard(GetLeaderboardRequest) returns (LeaderboardReply);
  rpc GetMemberRank(GetMemberRankRequest) returns (MemberRankReply);
}
