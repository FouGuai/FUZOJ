syntax = "proto3";

package contest;

option go_package = "fuzoj/api/proto/contest;contest";

message CheckParticipationRequest {
  string contest_id = 1;
  int64 user_id = 2;
  int64 problem_id = 3;
}

message CheckParticipationResponse {
  bool ok = 1;
  int32 error_code = 2;
  string error_message = 3;
}

message ContestRule {
  string rule_type = 1;
  int32 penalty_minutes = 2;
  string penalty_formula = 3;
  int32 penalty_cap_minutes = 4;
  int32 freeze_minutes_before_end = 5;
  bool allow_hack = 6;
  int32 hack_reward = 7;
  int32 hack_penalty = 8;
  int32 max_submissions_per_problem = 9;
  string score_mode = 10;
  bool publish_solutions_after_end = 11;
  bool virtual_participation_enabled = 12;
}

message ContestMetaRequest {
  string contest_id = 1;
}

message ContestMetaResponse {
  string contest_id = 1;
  string title = 2;
  string status = 3;
  string start_at = 4;
  string end_at = 5;
  ContestRule rule = 6;
}

message ContestRuleRequest {
  string contest_id = 1;
}

message ContestRuleResponse {
  ContestRule rule = 1;
}

message ContestProblem {
  int64 problem_id = 1;
  int32 order = 2;
  int32 score = 3;
  bool visible = 4;
  int32 version = 5;
}

message ContestProblemsRequest {
  string contest_id = 1;
}

message ContestProblemsResponse {
  repeated ContestProblem items = 1;
}

service ContestRpc {
  rpc CheckParticipation(CheckParticipationRequest) returns (CheckParticipationResponse);
  rpc GetContestMeta(ContestMetaRequest) returns (ContestMetaResponse);
  rpc GetContestRule(ContestRuleRequest) returns (ContestRuleResponse);
  rpc GetContestProblems(ContestProblemsRequest) returns (ContestProblemsResponse);
}
